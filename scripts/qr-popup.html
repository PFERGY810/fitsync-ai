      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: rgba(28, 28, 30, 0.8);
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
      max-width: 500px;
      width: 100%;

      margin-bottom: 10px;
      color: #00D4FF;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 14px;
      color: #ABABAB;
      margin-bottom: 30px;
    }
    .qr-code {
      background: #FFFFFF;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }
    .qr-code img {
      display: block;
      width: 100%;
      height: auto;
    }
    .url {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      color: #00D4FF;
    }
    .instructions {
      margin-top: 30px;
      text-align: left;
      font-size: 13px;
      color: #ABABAB;
      line-height: 1.6;
    }
    .instructions ol {
      margin-left: 20px;
      margin-top: 10px;
    }
    .instructions li {
      margin-bottom: 8px;
    }
    .repo-link {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .repo-link a {
      color: #00D4FF;
      text-decoration: none;
      font-size: 12px;
    }
    .repo-link a:hover {
      text-decoration: underline;
    }
